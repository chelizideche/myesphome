---
esphome:
  name: test

esp8266:
  board: d1_mini_lite

binary_sensor:
  - platform: gpio
    id: bs_1
    name: test bs1
    internal: true
    pin:
      number: D0
  - platform: gpio
    id: bs_2
    name: test bs2
    internal: false
    pin:
      number: D1
  - platform: touchscreen
    id: bs_3
    name: test bs3
    x_min: 100
    x_max: 200
    y_min: 300
    y_max: 400
    use_raw: true
  - platform: touchscreen
    id: bs_4
    name: test bs4
    x_min: 100
    x_max: 200
    y_min: 300
    y_max: 400

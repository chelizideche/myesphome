esphome:
  on_boot:
    then:
      - wifi.disable
      - wifi.enable
      - wifi.configure:
          ssid: MySSID
          password: password1
          on_connect:
            - logger.log: "Connected to WiFi!"
          on_error:
            - logger.log: "Failed to connect to WiFi!"

wifi:
  ssid: MySSID
  password: password1
  manual_ip:
    static_ip: 192.168.178.56
    gateway: 192.168.178.1
    subnet: 255.255.255.0

external_components:
  - source:
      type: local
      path: components

sensor:
  - platform: dfrobot_air_quality_sensor
    id: air_quality_sensor_level_sensor
    update_interval: 60s
    address: 0x19
	
    ######################	
    # PM1.0
	######################	
	pm_1_0:
      name: "PM1.0"
      id: pm1_0_sensor
      unit_of_measurement: "µg/m³"
      icon: mdi:chemical-weapon

	######################	
    # PM2.5
	######################	
    pm_2_5:
      name: "PM2.5"
      id: pm2_5_sensor
      unit_of_measurement: "µg/m³"
      icon: mdi:chemical-weapon
    
	######################	
    # PM10
	######################	
	pm_10:
      name: "PM10"
      id: pm10_sensor
      unit_of_measurement: "µg/m³"
      icon: mdi:chemical-weapon

    ######################
	# AQI: USA air quality standard CAQI: Europe air quality standard 
	######################
    aqi:
      name: "AQI"
      id: aqi_sensor
      calculation_type: "CAQI"
      icon: mdi:air-filter